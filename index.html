<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8/3 Special - Dreamy Flowers</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@600;800&display=swap');

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Quicksand', sans-serif; user-select: none; background: #000; }

        /* Background Gradient cho Màn 1 & 2 */
        #main-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #ffc3a0, #ffb199, #ff758c);
            background-size: 400% 400%; animation: gradientBG 10s ease infinite;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* UI Glassmorphism */
        #ui-container {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; z-index: 10; padding: 12px 30px;
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px; box-shadow: 0 8px 32px rgba(255, 105, 180, 0.2);
        }
        .stat-box { color: #fff; text-align: center; }
        .stat-value { font-size: 1.4rem; font-weight: 800; display: block; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }

        canvas { position: absolute; top: 0; left: 0; outline: none; z-index: 5; }

        /* Modal */
        #modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px; padding: 40px; text-align: center; z-index: 100;
            display: none; flex-direction: column; width: 75%; max-width: 320px;
        }
        #modal h2 { font-family: 'Pacifico', cursive; color: #fff; margin: 0; font-size: 2rem; }
        #modal p { color: #fff; margin: 20px 0; font-size: 1.1rem; line-height: 1.5; }
        
        #modal-btn {
            background: linear-gradient(45deg, #ff758c, #ff7eb3); border: none; padding: 14px; 
            border-radius: 30px; color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem;
            box-shadow: 0 5px 15px rgba(255, 117, 140, 0.4);
        }

        /* Màn cuối AR - NỀN ĐEN */
        #ar-section { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 200; background: #000; }
        #camera-preview { position: absolute; top: 15px; right: 15px; width: 110px; height: 82px; border-radius: 12px; transform: scaleX(-1); border: 2px solid rgba(255,255,255,0.3); z-index: 210; }
        #heart-canvas { width: 100%; height: 100%; z-index: 205; }

        .particle { position: absolute; width: 10px; height: 10px; background: #fff; border-radius: 50%; pointer-events: none; z-index: 100; animation: burst 0.6s ease-out forwards; }
        @keyframes burst { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; } }
    </style>
</head>
<body>

    <div id="main-bg"></div>
    <audio id="music-hehe" src="hehe.mp3" loop></audio>
    <audio id="music-456" src="456.mp3" loop></audio>

    <div id="game-layer">
        <div id="ui-container">
            <div class="stat-box"><span class="stat-label">Vòng</span><span class="stat-value" id="round-val">1</span></div>
            <div class="stat-box"><span class="stat-label">Thời gian</span><span class="stat-value"><span id="time-val">25</span>s</span></div>
            <div class="stat-box"><span class="stat-label">Điểm</span><span class="stat-value" id="score-val">0</span></div>
        </div>

        <div id="modal">
            <h2 id="modal-title">Chào Nàng!</h2>
            <p id="modal-desc">Đang tải hoa...</p>
            <button id="modal-btn">Bắt đầu ngay</button>
        </div>
    </div>

    <div id="ar-section">
        <video id="input_video" style="display:none;"></video>
        <canvas id="camera-preview"></canvas>
        <canvas id="heart-canvas"></canvas>
        <div style="position:absolute; bottom:40px; width:100%; text-align:center; color:white; font-size:0.9rem; opacity:0.7; pointer-events:none;">Xòe bàn tay để hiện trái tim</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let currentRound = 1, score = 0, timeLeft = 25, gameStatus = 'init'; 
        let flowers = [], bouquetModel, flowerModel, scene, camera, renderer, timerInterval, lastSpawnTime = 0;

        const heheMusic = document.getElementById('music-hehe');
        const finalMusic = document.getElementById('music-456');
        const modalBtn = document.getElementById('modal-btn');

        const levelConfig = {
            1: { speed: 0.07, rate: 1500 },
            2: { speed: 0.1, rate: 1000 },
            3: { speed: 0.14, rate: 700 }
        };

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('game-layer').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 2.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(5, 10, 5);
            scene.add(sun);

            const loader = new GLTFLoader();
            loader.load('flower_bouquet.glb', (gltf) => {
                flowerModel = gltf.scene;
                flowerModel.scale.set(3.5, 3.5, 3.5);
                document.getElementById('modal-desc').innerText = "Sẵn sàng bắt những đóa hoa xinh đẹp nhất chưa?";
                document.getElementById('modal').style.display = 'flex';
            });
            loader.load('bouquet.glb', (gltf) => {
                bouquetModel = gltf.scene;
                bouquetModel.visible = false;
                bouquetModel.scale.set(5.5, 5.5, 5.5);
                bouquetModel.position.set(0, -2, 0);
                scene.add(bouquetModel);
            });

            animate();
        }

        let modalCallback = null;
        modalBtn.onclick = () => {
            if (modalCallback) modalCallback();
        };

        function showModal(t, d, b, cb) {
            document.getElementById('modal-title').innerText = t;
            document.getElementById('modal-desc').innerText = d;
            modalBtn.innerText = b;
            document.getElementById('modal').style.display = 'flex';
            modalCallback = cb; 
        }

        function startRound() {
            if (currentRound === 1) heheMusic.play().catch(e => console.log("Audio play blocked"));
            document.getElementById('modal').style.display = 'none';
            flowers.forEach(f => scene.remove(f));
            flowers = [];
            timeLeft = 25; // Cập nhật thời gian vòng chơi thành 25s
            gameStatus = 'playing';
            document.getElementById('round-val').innerText = currentRound;
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if(gameStatus !== 'playing') return;
                timeLeft--;
                document.getElementById('time-val').innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    if (currentRound < 3) {
                        currentRound++;
                        showModal("Tuyệt vời!", `Sẵn sàng qua vòng ${currentRound} chưa?`, "Tiếp tục", startRound);
                    } else {
                        showFinalBouquet();
                    }
                }
            }, 1000);
        }

        function showFinalBouquet() {
            gameStatus = 'gift';
            heheMusic.pause();
            finalMusic.play();
            flowers.forEach(f => scene.remove(f));
            document.getElementById('ui-container').style.display = 'none';
            bouquetModel.visible = true;
            
            const pGeo = new THREE.SphereGeometry(0.06, 6, 6);
            const pMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            for(let i=0; i<40; i++){
                const p = new THREE.Mesh(pGeo, pMat);
                p.position.set((Math.random()-0.5)*8, (Math.random()-0.5)*10, (Math.random()-0.5)*5);
                scene.add(p);
                setInterval(() => { p.position.y += 0.02; if(p.position.y > 6) p.position.y = -6; }, 16);
            }
            showModal("Hạnh phúc nhé!", "8/3 thật rực rỡ nàng nha!", "Xem quà cuối nè", startAR);
        }

        function animate(time) {
            requestAnimationFrame(animate);
            if (gameStatus === 'playing') {
                const cfg = levelConfig[currentRound];
                if (time - lastSpawnTime > cfg.rate) {
                    const f = flowerModel.clone();
                    f.position.set((Math.random() - 0.5) * 8.5, 10, 0); 
                    scene.add(f);
                    flowers.push(f);
                    lastSpawnTime = time;
                }
                for (let i = flowers.length - 1; i >= 0; i--) {
                    flowers[i].position.y -= cfg.speed;
                    flowers[i].rotation.y += 0.03;
                    if (flowers[i].position.y < -10) {
                        gameStatus = 'lost';
                        showModal("Tiếc quá!", "Trượt mất 1 bông rồi, làm lại nhé!", "Thử lại", startRound);
                    }
                }
            }
            if (gameStatus === 'gift' && bouquetModel) bouquetModel.rotation.y += 0.015;
            renderer.render(scene, camera);
        }

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        window.addEventListener('pointerdown', (e) => {
            if(gameStatus !== 'playing') return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(flowers, true);
            if (intersects.length > 0) {
                let obj = intersects[0].object;
                while(obj.parent && obj.parent.type !== "Scene") obj = obj.parent;
                scene.remove(obj);
                flowers.splice(flowers.indexOf(obj), 1);
                score++;
                document.getElementById('score-val').innerText = score;
                createBurst(e.clientX, e.clientY);
            }
        });

        function createBurst(x, y) {
            for(let i=0; i<10; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = x+'px'; p.style.top = y+'px';
                const a = Math.random()*Math.PI*2, v = 40+Math.random()*50;
                p.style.setProperty('--tx', Math.cos(a)*v+'px');
                p.style.setProperty('--ty', Math.sin(a)*v+'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }
        }

        function startAR() {
            document.getElementById('game-layer').style.display = 'none';
            document.getElementById('main-bg').style.display = 'none'; 
            document.getElementById('ar-section').style.display = 'block'; 
            initHeartAR();
        }

        function initHeartAR() {
            const canvasH = document.getElementById('heart-canvas');
            const ctxH = canvasH.getContext('2d');
            const previewCanvas = document.getElementById('camera-preview');
            const previewCtx = previewCanvas.getContext('2d');
            const video = document.getElementById('input_video');
            let w = canvasH.width = window.innerWidth, h = canvasH.height = window.innerHeight;
            let handOpen = 0, hX = w/2, hY = h/2;

            const heartPos = (rad) => [Math.pow(Math.sin(rad), 3), -(15 * Math.cos(rad) - 5 * Math.cos(2 * rad) - 2 * Math.cos(3 * rad) - Math.cos(4 * rad))];
            let points = [];
            for (let i = 0; i < Math.PI * 2; i += 0.1) points.push(heartPos(i));
            let particles = points.map(() => ({ x: Math.random()*w, y: Math.random()*h, vx: 0, vy: 0, q: ~~(Math.random()*points.length) }));

            const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
            hands.setOptions({maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6});
            hands.onResults(res => {
                previewCtx.clearRect(0,0,110,82);
                previewCtx.drawImage(res.image, 0, 0, 110, 82);
                if (res.multiHandLandmarks?.length > 0) {
                    const lm = res.multiHandLandmarks[0];
                    hX = (1 - lm[9].x) * w; hY = lm[9].y * h;
                    const d = Math.sqrt(Math.pow(lm[12].x - lm[0].x, 2) + Math.pow(lm[12].y - lm[0].y, 2));
                    handOpen = Math.min(Math.max((d - 0.1) * 3.8, 0), 1.4);
                } else { handOpen = Math.max(0, handOpen - 0.05); }
            });

            new Camera(video, { onFrame: async () => { await hands.send({image: video}); }, facingMode: 'user' }).start();

            function drawH() {
                ctxH.fillStyle = "rgba(0,0,0,0.2)"; 
                ctxH.fillRect(0, 0, w, h);
                particles.forEach(p => {
                    const target = [handOpen * points[p.q][0] * 13 + hX, handOpen * points[p.q][1] * 13 + hY];
                    p.vx += (target[0] - p.x) * 0.06; p.vy += (target[1] - p.y) * 0.06;
                    p.x += p.vx *= 0.75; p.y += p.vy *= 0.75;
                    ctxH.fillStyle = `hsla(${340 + handOpen*20}, 100%, 75%, 0.8)`;
                    ctxH.fillRect(p.x, p.y, 2.5, 2.5);
                });
                requestAnimationFrame(drawH);
            }
            drawH();
        }

        initThree();
        modalCallback = startRound; 

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
